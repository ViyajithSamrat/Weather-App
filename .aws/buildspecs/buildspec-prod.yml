version: 0.2

# =============================================================================
# CodeBuild Buildspec — PRODUCTION environment
# Triggered by: push to `main` branch (after manual approval gate)
# Differences vs dev: Secrets Manager (not SSM), stricter image tagging
# =============================================================================

env:
  variables:
    NODE_ENV: "production"
    AWS_DEFAULT_REGION: "us-east-1"
    ENV_NAME: "prod"
  secrets-manager:
    OPENWEATHER_API_KEY: "weather-app/prod/secrets:OPENWEATHER_API_KEY"
  exported-variables:
    - IMAGE_URI

phases:
  install:
    runtime-versions:
      nodejs: 20

  pre_build:
    commands:
      - echo "=== ECR login ==="
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$APP_NAME-$ENV_NAME
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      # Production: always use explicit commit hash, never just 'latest'
      - IMAGE_TAG=$COMMIT_HASH
      - IMAGE_URI=$REPOSITORY_URI:$IMAGE_TAG

  build:
    commands:
      - echo "=== Building PRODUCTION image ==="
      - |
        docker build \
          --tag $IMAGE_URI \
          --tag $REPOSITORY_URI:stable \
          --file Dockerfile \
          .

  post_build:
    commands:
      - docker push $IMAGE_URI
      - docker push $REPOSITORY_URI:stable
      - printf '[{"name":"%s","imageUri":"%s"}]' $CONTAINER_NAME $IMAGE_URI > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json

cache:
  paths:
    - "/root/.npm/**/*"
