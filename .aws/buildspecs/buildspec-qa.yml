version: 0.2

# =============================================================================
# CodeBuild Buildspec — QA environment
# Triggered by: push to `qa` branch
# Secrets:      AWS SSM Parameter Store (same as dev — non-production tier)
# Differences from dev: ENV_NAME=qa, image tagged :qa-latest (not :latest)
# =============================================================================

env:
  variables:
    NODE_ENV: "development"
    AWS_DEFAULT_REGION: "us-east-1"
    ENV_NAME: "qa"
  parameter-store:
    OPENWEATHER_API_KEY: "/weather-app/qa/OPENWEATHER_API_KEY"
  exported-variables:
    - IMAGE_URI

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "=== QA Build — $(date) ==="
      - npm install -g npm@latest

  pre_build:
    commands:
      - echo "=== ECR login ==="
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$APP_NAME-$ENV_NAME
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - IMAGE_TAG=${COMMIT_HASH:-latest}
      - IMAGE_URI=$REPOSITORY_URI:sha-$IMAGE_TAG

  build:
    commands:
      - echo "=== Building Docker image — QA ==="
      - |
        docker build \
          --tag $IMAGE_URI \
          --tag $REPOSITORY_URI:qa-latest \
          --file Dockerfile \
          --label "git.commit=$CODEBUILD_RESOLVED_SOURCE_VERSION" \
          --label "build.id=$CODEBUILD_BUILD_ID" \
          --label "environment=qa" \
          .

  post_build:
    commands:
      - echo "=== Pushing image to ECR ==="
      - docker push $IMAGE_URI
      - docker push $REPOSITORY_URI:qa-latest
      - echo "=== Writing imagedefinitions.json ==="
      - printf '[{"name":"%s","imageUri":"%s"}]' "$CONTAINER_NAME" "$IMAGE_URI" > imagedefinitions.json
      - cat imagedefinitions.json
      - echo "=== QA Build complete — Image: $IMAGE_URI ==="

artifacts:
  files:
    - imagedefinitions.json

cache:
  paths:
    - "/root/.npm/**/*"
    - "/root/.docker/buildkit/**/*"
