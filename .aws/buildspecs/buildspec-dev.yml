version: 0.2

# =============================================================================
# CodeBuild Buildspec — DEV environment
# Triggered by: push to `dev` branch
# Outputs:      Docker image pushed to ECR, imagedefinitions.json for ECS
# =============================================================================

env:
  variables:
    NODE_ENV: "development"
    AWS_DEFAULT_REGION: "us-east-1"
    ENV_NAME: "dev"
  parameter-store:
    OPENWEATHER_API_KEY: "/weather-app/dev/OPENWEATHER_API_KEY"
  exported-variables:
    - IMAGE_URI

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "=== Installing tools ==="
      - npm install -g npm@latest

  pre_build:
    commands:
      - echo "=== Logging into ECR ==="
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$APP_NAME-$ENV_NAME
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - IMAGE_TAG=${COMMIT_HASH:-latest}
      - IMAGE_URI=$REPOSITORY_URI:sha-$IMAGE_TAG

  build:
    commands:
      - echo "=== Building Docker image ==="
      - |
        docker build \
          --tag $IMAGE_URI \
          --tag $REPOSITORY_URI:latest \
          --file Dockerfile \
          .

  post_build:
    commands:
      - echo "=== Pushing image to ECR ==="
      - docker push $IMAGE_URI
      - docker push $REPOSITORY_URI:latest
      - echo "=== Writing imagedefinitions.json for ECS deploy ==="
      - printf '[{"name":"%s","imageUri":"%s"}]' $CONTAINER_NAME $IMAGE_URI > imagedefinitions.json
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json

cache:
  paths:
    - "/root/.npm/**/*"
