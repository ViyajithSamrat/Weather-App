version: 0.2

# =============================================================================
# CodeBuild Buildspec — STAGING environment
# Triggered by: push to `staging` branch (after manual approval gate)
# Secrets:      AWS Secrets Manager (production-tier secret handling)
# Differences:
#   - Secrets Manager (not SSM) — matches prod pattern for pre-prod validation
#   - Image tagged :sha-<hash> + :staging-latest (never :latest)
#   - Docker image labels include full commit SHA for traceability
#   - Trivy vulnerability scan blocks on CRITICAL findings
# =============================================================================

env:
  variables:
    NODE_ENV: "production"
    AWS_DEFAULT_REGION: "us-east-1"
    ENV_NAME: "staging"
  secrets-manager:
    OPENWEATHER_API_KEY: "weather-app/staging/secrets:OPENWEATHER_API_KEY"
  exported-variables:
    - IMAGE_URI

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "=== STAGING Build — $(date) ==="
      # Install Trivy for container vulnerability scanning
      - |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sh -s -- -b /usr/local/bin v0.50.0

  pre_build:
    commands:
      - echo "=== ECR login ==="
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$APP_NAME-$ENV_NAME
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      # Staging: always use explicit commit hash — never rely on :latest
      - IMAGE_TAG=sha-$COMMIT_HASH
      - IMAGE_URI=$REPOSITORY_URI:$IMAGE_TAG
      - echo "Target image → $IMAGE_URI"

  build:
    commands:
      - echo "=== Building STAGING image ==="
      - |
        docker build \
          --tag $IMAGE_URI \
          --tag $REPOSITORY_URI:staging-latest \
          --file Dockerfile \
          --label "git.commit=$CODEBUILD_RESOLVED_SOURCE_VERSION" \
          --label "build.id=$CODEBUILD_BUILD_ID" \
          --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          --label "environment=staging" \
          .

  post_build:
    commands:
      # Vulnerability scan — FAIL build on any CRITICAL CVE
      - echo "=== Trivy vulnerability scan ==="
      - |
        trivy image \
          --exit-code 1 \
          --severity CRITICAL \
          --no-progress \
          $IMAGE_URI
      - echo "=== Scan passed — no CRITICAL CVEs ==="
      - echo "=== Pushing image to ECR ==="
      - docker push $IMAGE_URI
      - docker push $REPOSITORY_URI:staging-latest
      - echo "=== Writing imagedefinitions.json ==="
      - printf '[{"name":"%s","imageUri":"%s"}]' "$CONTAINER_NAME" "$IMAGE_URI" > imagedefinitions.json
      - cat imagedefinitions.json
      - echo "=== STAGING Build complete — Image: $IMAGE_URI ==="

artifacts:
  files:
    - imagedefinitions.json

reports:
  TrivyScanReport:
    files:
      - trivy-report.json
    discard-paths: yes
    file-format: JSON

cache:
  paths:
    - "/root/.npm/**/*"
    - "/root/.cache/trivy/**/*"
