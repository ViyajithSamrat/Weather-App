# SonarCloud project configuration
# Organization: sign in to sonarcloud.io with GitHub → Settings → Organization Key
# Project key: auto-generated when you create the project, e.g. ViyajithSamrat_Weather-App

sonar.projectKey=ViyajithSamrat_Weather-App
sonar.organization=viyajithsamrat

# Paths are relative to the repository root
sonar.sources=weather-app
sonar.exclusions=weather-app/.next/**,weather-app/node_modules/**,weather-app/__tests__/**,weather-app/e2e/**,weather-app/playwright-report/**,weather-app/coverage/**

sonar.tests=weather-app/__tests__,weather-app/e2e
sonar.test.inclusions=weather-app/__tests__/**/*.test.ts,weather-app/e2e/**/*.spec.ts

# LCOV coverage report produced by `npm run test:coverage`
sonar.javascript.lcov.reportPaths=weather-app/coverage/lcov.info

sonar.typescript.tsconfigPath=weather-app/tsconfig.json
