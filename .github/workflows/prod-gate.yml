name: Production Gate — Unit · E2E · Smoke · SonarCloud

# Runs on every PR from dev → main.
# ALL checks must pass before the PR can be merged to main.
# CodePipeline then triggers the production deploy (with SNS manual approval).
#
# IMPORTANT: This file must exist on the MAIN branch (base branch of the PR).
# GitHub reads pull_request workflows from the base branch, not the head branch.

on:
  pull_request:
    branches:
      - main

concurrency:
  group: prod-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Vitest unit tests + lcov coverage report (uploaded for SonarCloud)
  # Blocks merge on ANY test failure or coverage threshold miss (60%).
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: weather-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: weather-app/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Run Vitest with coverage
        run: npm run test:coverage

      - name: Upload lcov artifact (for SonarCloud)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lcov-report
          path: weather-app/coverage/lcov.info
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Playwright E2E + pytest smoke (shared Next.js server on port 3000)
  # Tests the full HTTP surface of the app: pages, API routes, tile proxy.
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-and-smoke:
    name: E2E & Smoke Tests (Playwright + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: weather-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: weather-app/package-lock.json

      - name: Install Node dependencies
        run: npm ci --frozen-lockfile

      - name: Install Playwright (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Build Next.js app
        run: npm run build

      - name: Start Next.js server
        run: npm run start &
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          PORT: 3000

      - name: Wait for server to be ready
        run: |
          echo "Waiting for Next.js server on port 3000..."
          timeout 60 bash -c 'until curl -sf http://localhost:3000 > /dev/null; do sleep 2; done'
          echo "Server is ready."

      - name: Playwright E2E tests
        run: npm run test:e2e -- --project=chromium
        env:
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: weather-app/playwright-report/
          retention-days: 3

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install pytest dependencies
        working-directory: .
        run: pip install -r tests/requirements.txt

      - name: Run pytest smoke tests
        working-directory: .
        run: |
          pytest tests/ -v \
            --html=tests/smoke-report.html \
            --self-contained-html

      - name: Upload pytest report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-smoke-report
          path: tests/smoke-report.html
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: SonarCloud static analysis (optional — skips when SONAR_TOKEN absent)
  # Uses step-level env var check — NEVER use secrets context in job-level if:
  # (causes 0-second "workflow file issue" failure if token is missing)
  # ─────────────────────────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - name: Check for SONAR_TOKEN
        id: token-check
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN secret not configured — skipping SonarCloud scan."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Checkout
        if: steps.token-check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download lcov coverage report
        if: steps.token-check.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: lcov-report
          path: weather-app/coverage/

      - name: SonarCloud Scan
        if: steps.token-check.outputs.skip != 'true'
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: weather-app

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Production Gate — the required status check for branch protection.
  #
  # Set this as the REQUIRED check in GitHub → Settings → Branches → main.
  # PR cannot merge unless this job is green.
  # SonarCloud is informational only — gate passes without it.
  # ─────────────────────────────────────────────────────────────────────────────
  production-gate:
    name: Production Gate (required)
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-and-smoke, sonarcloud]
    if: always()

    steps:
      - name: Evaluate gate results
        run: |
          echo "=========================================="
          echo "  PRODUCTION GATE EVALUATION"
          echo "=========================================="
          echo "unit-tests:    ${{ needs.unit-tests.result }}"
          echo "e2e-and-smoke: ${{ needs.e2e-and-smoke.result }}"
          echo "sonarcloud:    ${{ needs.sonarcloud.result }} (informational)"
          echo ""

          FAILED=false

          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "::error title=Unit Tests Failed::Vitest unit tests must pass before promoting to production."
            FAILED=true
          fi

          if [[ "${{ needs.e2e-and-smoke.result }}" != "success" ]]; then
            echo "::error title=E2E Tests Failed::Playwright + pytest smoke tests must pass before promoting to production."
            FAILED=true
          fi

          if [[ "$FAILED" == "true" ]]; then
            echo ""
            echo "Production gate BLOCKED. Fix failing checks and re-push."
            exit 1
          fi

          echo "All production gates passed."
          echo "This PR is safe to merge to main."
          echo "After merge: CodePipeline triggers → SNS approval email → production deploy."
