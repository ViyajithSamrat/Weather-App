name: QA Gate — Unit · E2E · Smoke · SonarCloud · CodeGuru

on:
  pull_request:
    branches:
      - qa

concurrency:
  group: qa-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Vitest unit tests + coverage report (lcov for SonarCloud)
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: weather-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: weather-app/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Run Vitest with coverage
        run: npm run test:coverage

      - name: Upload lcov artifact (for SonarCloud)
        uses: actions/upload-artifact@v4
        with:
          name: lcov-report
          path: weather-app/coverage/lcov.info
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Playwright E2E + pytest smoke (shared Next.js server)
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-and-smoke:
    name: E2E & Smoke Tests (Playwright + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: weather-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: weather-app/package-lock.json

      - name: Install Node dependencies
        run: npm ci --frozen-lockfile

      - name: Install Playwright (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Build Next.js app
        run: npm run build
        # API key not needed at build time — used at runtime only

      - name: Start Next.js server
        run: npm run start &
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          PORT: 3000

      - name: Wait for server to be ready
        run: |
          echo "Waiting for Next.js server on port 3000…"
          timeout 60 bash -c 'until curl -sf http://localhost:3000 > /dev/null; do sleep 2; done'
          echo "Server is ready."

      - name: Playwright E2E tests
        run: npm run test:e2e -- --project=chromium
        env:
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: weather-app/playwright-report/
          retention-days: 3

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install pytest dependencies
        working-directory: .
        run: pip install -r tests/requirements.txt

      - name: Run pytest smoke tests
        working-directory: .
        run: |
          pytest tests/ -v \
            --html=tests/smoke-report.html \
            --self-contained-html

      - name: Upload pytest report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-smoke-report
          path: tests/smoke-report.html
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: SonarCloud static analysis (needs lcov from unit-tests)
  # ─────────────────────────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [unit-tests]
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for blame / new-code detection

      - name: Download lcov coverage report
        uses: actions/download-artifact@v4
        with:
          name: lcov-report
          path: weather-app/coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          # sonar-project.properties at repo root provides all config

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: AWS CodeGuru Reviewer — NON-BLOCKING peer review (posts PR comments)
  # Note: CodeGuru Reviewer reached EOL Nov 2023. This job is scaffolded per
  # mentor requirements; continue-on-error: true prevents it from blocking the
  # gate if the service is unavailable. OIDC role + S3 bucket must be created
  # manually before this job will succeed (see manual setup steps in plan).
  # ─────────────────────────────────────────────────────────────────────────────
  codeguru:
    name: CodeGuru Reviewer (non-blocking)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true

    permissions:
      id-token: write
      contents: read
      security-events: write

    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CODEGURU_IAM_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Amazon CodeGuru Reviewer
        uses: aws-actions/codeguru-reviewer@v1.1
        with:
          build_path: weather-app
          s3_bucket: ${{ secrets.CODEGURU_S3_BUCKET }}

      - name: Upload CodeGuru results to GitHub Security
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codeguru-results.sarif.gz

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: QA Gate — the ONLY check registered in branch protection rules.
  # Passes only when unit-tests + e2e-and-smoke + sonarcloud all succeed.
  # CodeGuru is non-blocking (not listed in needs).
  # ─────────────────────────────────────────────────────────────────────────────
  qa-gate:
    name: QA Gate (required)
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-and-smoke, sonarcloud]
    if: always()

    steps:
      - name: Evaluate gate results
        run: |
          echo "unit-tests:    ${{ needs.unit-tests.result }}"
          echo "e2e-and-smoke: ${{ needs.e2e-and-smoke.result }}"
          echo "sonarcloud:    ${{ needs.sonarcloud.result }}"

          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "::error::Unit tests failed — fix Vitest failures before promoting to QA."
            exit 1
          fi
          if [[ "${{ needs.e2e-and-smoke.result }}" != "success" ]]; then
            echo "::error::E2E or smoke tests failed — fix Playwright/pytest failures before promoting to QA."
            exit 1
          fi
          if [[ "${{ needs.sonarcloud.result }}" != "success" && "${{ needs.sonarcloud.result }}" != "skipped" ]]; then
            echo "::error::SonarCloud quality gate failed — fix code quality issues before promoting to QA."
            exit 1
          fi

          echo "✅ All QA gates passed. PR is clear to merge into qa."
