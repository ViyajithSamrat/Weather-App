# =============================================================================
# Enterprise Weather App — Local Development Stack
#
# Usage:
#   cp .env.example .env.local          # fill in real API keys
#   docker compose up --build           # build + start
#   docker compose up -d                # detached mode
#   docker compose logs -f weather-app  # tail logs
#   docker compose down -v              # stop + remove volumes
#
# Environments modeled here: LOCAL only
# DEV / QA / STAGING / PROD are handled by ECS + CloudFormation.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Main application — Next.js 16 / React 19
  # ---------------------------------------------------------------------------
  weather-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: weather-app-local
    image: weather-app:local

    # Runtime environment (server-side only vars go here, NOT in build args)
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: "1"

    # env_file injects secrets into the container — takes precedence is avoided
    # by NOT duplicating keys in the environment block above.
    env_file:
      - .env.local

    ports:
      - "80:3000"

    # Healthcheck mirrors the Dockerfile HEALTHCHECK so compose reports status
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    restart: unless-stopped

    # Resource limits — keeps local Docker from hogging RAM
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

    networks:
      - weather-net

# =============================================================================
# Networks
# =============================================================================
networks:
  weather-net:
    driver: bridge
    name: weather-app-network
